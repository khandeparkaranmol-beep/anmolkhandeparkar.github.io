<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmol Khandeparkar — AI Product Manager</title>
<meta name="description" content="AI Product Manager. Shipped production AI/ML systems at Goldman Sachs, builds independently with Claude and Supabase. Strong opinions on great products, venture capital, and chai.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --bg-warm: #FBF8F4;
  --surface: #FFFFFF;
  --border: #EDE8E0;
  --border2: #F5F1EC;
  --text: #1a1a2e;
  --text2: #4a4a5a;
  --muted: #8a8a9a;
  --muted2: #bbb;
  --accent: #222222;
  --purple: #2a2a2a;
  --blue: #2a2a2a;
  --green: #2a2a2a;
  --pink: #333333;
  --amber: #2a2a2a;
  --sans: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Space Grotesk', sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --radius: 20px;
  --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
  --shadow-hover: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
}
/* ── Dark mode ── */
[data-theme="dark"] {
  --bg: #0f0f17;
  --bg-warm: #141420;
  --surface: #1a1a2e;
  --border: #2a2a3e;
  --border2: #222236;
  --text: #e8e8f0;
  --text2: #b0b0c8;
  --muted: #7a7a9a;
  --muted2: #555;
  --accent: #b0b0c8;
  --shadow: 0 2px 8px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
}
[data-theme="dark"] nav { background: rgba(15,15,23,0.85); }
[data-theme="dark"] nav.scrolled { border-bottom-color: var(--border); box-shadow: 0 1px 12px rgba(0,0,0,0.3); }
[data-theme="dark"] ::selection { background: var(--text); color: var(--bg); }
[data-theme="dark"] .btn-primary { background: #e8e8f0; color: #0f0f17; box-shadow: 0 4px 16px rgba(232,232,240,0.15); }
[data-theme="dark"] .btn-primary:hover { background: #fff; color: #0f0f17; box-shadow: 0 8px 24px rgba(255,255,255,0.2); }
[data-theme="dark"] .btn-secondary { background: var(--surface); border-color: var(--border); }
[data-theme="dark"] .skill:hover { background: rgba(255,255,255,0.06); }
[data-theme="dark"] .status.shipped { background: rgba(255,255,255,0.06); }
[data-theme="dark"] .status.upcoming { background: rgba(255,255,255,0.06); }
[data-theme="dark"] .card-tech span { background: rgba(255,255,255,0.05); }
[data-theme="dark"] .hero-photo { border-color: var(--bg); }

/* ── Theme toggle ── */
.theme-toggle {
  background: none; border: 1px solid var(--border); border-radius: 50%;
  width: 36px; height: 36px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 16px;
  transition: all 0.3s var(--ease); color: var(--muted); flex-shrink: 0;
}
.theme-toggle:hover { border-color: #6366f1; color: var(--text); transform: rotate(30deg); box-shadow: 0 0 16px rgba(99,102,241,0.15); }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s ease, color 0.3s ease;
}
::selection { background: var(--text); color: #fff; }

/* ── Progress ── */
#progress {
  position: fixed; top: 0; left: 0; height: 3px;
  background: linear-gradient(90deg, var(--text), var(--muted));
  z-index: 10000; width: 0; border-radius: 0 2px 2px 0;
}

/* ── Nav ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  padding: 0 48px; height: 64px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid transparent;
  transition: border-color 0.3s, box-shadow 0.3s;
}
nav.scrolled { border-bottom-color: var(--border2); box-shadow: 0 1px 12px rgba(0,0,0,0.04); }
.nav-name { font-family: var(--display); font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -0.3px; }
.nav-status {
  font-family: var(--mono); font-size: 11px; color: var(--green);
  display: flex; align-items: center; gap: 6px;
}
.nav-status::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ── Layout ── */
.wrap { max-width: 720px; margin: 0 auto; padding: 0 32px; }
.wrap-wide { max-width: 1000px; margin: 0 auto; padding: 0 32px; }

/* ── Warm section backgrounds ── */
.bg-warm { background: var(--bg-warm); transition: background 0.4s ease; }

/* ── Noise texture overlay ── */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
  opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 256px;
}

/* ── Aurora gradient ── */
.aurora {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
}
.aurora-blob {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12;
  animation: aurora-drift 12s ease-in-out infinite alternate;
}
[data-theme="dark"] .aurora-blob { opacity: 0.08; }
.aurora-blob:nth-child(1) {
  width: 600px; height: 600px; top: -20%; right: -10%;
  background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
  animation-duration: 14s;
}
.aurora-blob:nth-child(2) {
  width: 500px; height: 500px; bottom: -15%; left: -10%;
  background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
  animation-duration: 18s; animation-delay: -4s;
}
.aurora-blob:nth-child(3) {
  width: 400px; height: 400px; top: 30%; left: 40%;
  background: radial-gradient(circle, rgba(45,212,191,0.10) 0%, transparent 70%);
  animation-duration: 16s; animation-delay: -8s;
}
[data-theme="dark"] .aurora-blob:nth-child(1) {
  background: radial-gradient(circle, rgba(99,102,241,0.20) 0%, transparent 70%);
}
[data-theme="dark"] .aurora-blob:nth-child(2) {
  background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 70%);
}
[data-theme="dark"] .aurora-blob:nth-child(3) {
  background: radial-gradient(circle, rgba(45,212,191,0.12) 0%, transparent 70%);
}
@keyframes aurora-drift {
  0% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(40px, -30px) scale(1.1); }
  66% { transform: translate(-20px, 20px) scale(0.95); }
  100% { transform: translate(30px, -10px) scale(1.05); }
}

/* ── Floating particles ── */
.particles {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 1;
}
.particle {
  position: absolute; border-radius: 50%; pointer-events: none;
  background: #6366f1; opacity: 0;
  animation: particle-float linear infinite;
}
.particle:nth-child(odd) { background: #8b5cf6; }
.particle:nth-child(3n) { background: #2dd4bf; }
@keyframes particle-float {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-20vh) scale(1); opacity: 0; }
}

/* ── Decorative blobs (legacy, kept for contact section) ── */
.blob {
  position: absolute; border-radius: 50%; pointer-events: none;
  filter: blur(100px); opacity: 0.07;
}

/* ── Hero entrance orchestration ── */
.hero-enter { opacity: 0; transform: translateY(40px); }
.hero-enter.go {
  opacity: 1; transform: translateY(0);
  transition: opacity 0.8s var(--ease), transform 0.8s var(--ease);
}
.hero-enter:nth-child(1) { transition-delay: 0.1s; }
.hero-enter:nth-child(2) { transition-delay: 0.25s; }
.hero-enter:nth-child(3) { transition-delay: 0.4s; }
.hero-enter:nth-child(4) { transition-delay: 0.55s; }
.hero-enter:nth-child(5) { transition-delay: 0.65s; }
.hero-enter:nth-child(6) { transition-delay: 0.75s; }
.hero-enter:nth-child(7) { transition-delay: 0.85s; }

/* ── Hero photo ── */
.hero-photo-wrap {
  width: 120px; height: 120px; border-radius: 50%; margin-bottom: 28px;
  position: relative; display: inline-block;
}
.hero-photo-wrap::before {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  background: conic-gradient(from 0deg, #6366f1, #8b5cf6, #2dd4bf, #6366f1);
  z-index: 0; animation: photo-ring-spin 4s linear infinite;
}
@keyframes photo-ring-spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.hero-photo {
  width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
  position: relative; z-index: 1; border: 3px solid var(--bg);
  transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease);
}
.hero-photo:hover { transform: scale(1.08); box-shadow: 0 8px 32px rgba(0,0,0,0.15); }

/* ── Hero ── */
#hero {
  min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
  padding-top: 18vh; padding-bottom: 60px;
  position: relative; overflow: hidden; text-align: center;
}
#hero .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; right: -150px; }
#hero .blob-2 { width: 400px; height: 400px; background: var(--purple); bottom: -50px; left: -200px; }
#hero .wrap { display: flex; flex-direction: column; align-items: center; }
.hero-name {
  font-family: var(--display); font-weight: 800;
  font-size: clamp(36px, 5vw, 52px);
  letter-spacing: -2px; line-height: 1; margin-bottom: 8px;
  white-space: nowrap;
}
.hero-name .dot {
  color: #6366f1;
}
[data-theme="dark"] .hero-name {
  background: linear-gradient(135deg, #e8e8f0, #b0b0c8, #8b5cf6);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
[data-theme="dark"] .hero-name .dot {
  -webkit-text-fill-color: #6366f1;
}
.hero-sub {
  font-family: var(--display); font-size: clamp(16px, 2vw, 19px);
  font-weight: 500; letter-spacing: -0.3px; margin-bottom: 40px;
  color: var(--text2);
}
.hero-sub .hl {
  font-weight: 700; color: var(--text);
}
.hero-bio { display: none; }
.hero-signoff { display: none; }
.chai-trigger { color: inherit; text-decoration: none; border-bottom: 2px dashed var(--muted); cursor: pointer; transition: border-color 0.2s, color 0.2s; }
.chai-trigger:hover { border-color: var(--text); color: var(--text); }
.hero-actions { display: none; }
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 32px; background: var(--text); color: #fff;
  border-radius: 100px; font-size: 15px; font-weight: 600;
  text-decoration: none; transition: all 0.3s var(--ease);
  box-shadow: 0 4px 16px rgba(26,26,46,0.2);
}
.btn-primary:hover { background: #000; transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.25), 0 0 60px rgba(0,0,0,0.08); }
.btn-secondary {
  display: inline-flex; align-items: center;
  padding: 14px 28px; border: 1.5px solid var(--border);
  border-radius: 100px; font-size: 14px; font-weight: 500;
  color: var(--text2); text-decoration: none;
  transition: all 0.3s var(--ease); background: var(--surface);
}
.btn-secondary:hover { border-color: var(--text); color: var(--text); transform: translateY(-2px); box-shadow: var(--shadow); }

/* ── Prompt bar ── */
/* ── Search bar ── */
.prompt-wrap {
  margin-top: 0; width: 100%; max-width: 620px; position: relative;
}
.prompt-input-wrap {
  position: relative; width: 100%;
}
.prompt-bar {
  width: 100%; padding: 18px 56px 18px 48px;
  font-family: var(--sans); font-size: 16px; font-weight: 400;
  color: var(--text); background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 32px;
  outline: none;
  transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease), background 0.3s;
  -webkit-appearance: none;
}
[data-theme="dark"] .prompt-bar { background: rgba(26,26,46,0.4); border-color: rgba(255,255,255,0.08); }
.prompt-search-icon {
  position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 16px; pointer-events: none;
  transition: color 0.3s;
}
.prompt-bar:focus ~ .prompt-search-icon { color: var(--text); }
.prompt-bar::placeholder { color: var(--muted); }
.prompt-bar:focus {
  border-color: rgba(99,102,241,0.4);
  box-shadow: 0 4px 32px rgba(99,102,241,0.08), 0 0 0 4px rgba(99,102,241,0.06);
  background: rgba(255,255,255,0.9);
}
[data-theme="dark"] .prompt-bar:focus {
  box-shadow: 0 4px 32px rgba(99,102,241,0.15), 0 0 0 4px rgba(99,102,241,0.10);
  background: rgba(26,26,46,0.8);
}
.prompt-submit {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.3s var(--ease); opacity: 0;
  box-shadow: 0 2px 12px rgba(99,102,241,0.3);
}
.prompt-bar:not(:placeholder-shown) ~ .prompt-submit { opacity: 1; }
.prompt-submit:hover { transform: translateY(-50%) scale(1.12); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
.prompt-bar.loading { pointer-events: none; opacity: 0.6; }

/* ── Suggested query chips ── */
.prompt-chips {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-top: 24px; justify-content: center; max-width: 620px;
}
.prompt-chip {
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  color: var(--muted); background: transparent;
  border: 1px solid transparent; border-radius: 100px;
  padding: 9px 20px; cursor: pointer;
  transition: all 0.3s var(--ease);
  white-space: nowrap; letter-spacing: 0.01em;
  position: relative;
}
.prompt-chip:hover {
  color: var(--text); background: rgba(99,102,241,0.06);
  border-color: rgba(99,102,241,0.15);
  transform: translateY(-1px);
}
[data-theme="dark"] .prompt-chip:hover {
  background: rgba(99,102,241,0.10); border-color: rgba(99,102,241,0.20);
}
.prompt-chip.active {
  color: #fff; background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-color: transparent; box-shadow: 0 4px 16px rgba(99,102,241,0.30);
  transform: translateY(-1px);
}
.prompt-sep {
  width: 1px; height: 20px; background: var(--border); align-self: center; flex-shrink: 0;
}
.chip-break {
  flex-basis: 100%; height: 0; margin: 0; padding: 0; border: none;
}
.prompt-chips .prompt-chip {
  flex: 1 1 0; text-align: center; max-width: 200px;
}
[data-theme="dark"] .prompt-sep { background: rgba(255,255,255,0.08); }

/* ── Quick-answer cards ── */
.quick-cards {
  width: 100%; max-width: 620px; margin-top: 24px;
  overflow: hidden; transition: max-height 0.5s var(--ease), opacity 0.4s;
  max-height: 0; opacity: 0;
}
.quick-cards.show { max-height: 4000px; opacity: 1; transition: max-height 0.8s var(--ease), opacity 0.6s var(--ease); }
.quick-card {
  text-align: left; padding: 16px 20px; margin-bottom: 10px;
  background: rgba(255,255,255,0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: 16px;
  transition: all 0.3s var(--ease);
}
[data-theme="dark"] .quick-card { background: rgba(26,26,46,0.5); }
.quick-card:hover { border-color: rgba(99,102,241,0.3); box-shadow: 0 6px 24px rgba(99,102,241,0.08); transform: translateY(-2px); }
[data-theme="dark"] .quick-card:hover { box-shadow: 0 6px 24px rgba(99,102,241,0.15); }
.quick-card a { text-decoration: none; color: inherit; display: block; }
.quick-card-title {
  font-family: var(--display); font-size: 15px; font-weight: 600;
  color: var(--text); margin-bottom: 4px;
}
.quick-card-meta {
  font-size: 13px; color: var(--muted); margin-bottom: 6px;
}
.quick-card-highlight {
  font-size: 13px; font-weight: 600; color: #6366f1;
  padding: 8px 14px; margin-bottom: 8px; border-radius: 10px;
  background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.12);
  letter-spacing: 0.01em; line-height: 1.5;
}
[data-theme="dark"] .quick-card-highlight { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.2); }
.quick-card-body {
  font-size: 14px; color: var(--text2); line-height: 1.55;
}
.quick-card-body .qc-line {
  display: flex; align-items: baseline; gap: 8px;
  padding: 4px 0;
}
.quick-card-body .qc-line:first-child { padding-top: 0; }
.quick-card-body .qc-line:last-child { padding-bottom: 0; }
.quick-card-body .qc-bullet {
  flex-shrink: 0; width: 4px; height: 4px; border-radius: 50%;
  background: rgba(99,102,241,0.5); margin-top: 8px;
}
.quick-card-body .qc-impact {
  color: var(--text); font-weight: 600;
}
.quick-card-tags {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
}
.quick-card-tag {
  font-size: 11px; font-weight: 500; padding: 3px 10px;
  border-radius: 12px; background: rgba(99,102,241,0.05); color: var(--muted);
  border: 1px solid rgba(99,102,241,0.10);
}
[data-theme="dark"] .quick-card-tag { background: rgba(99,102,241,0.10); border-color: rgba(99,102,241,0.15); }
.quick-cards-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; padding: 0 4px;
}
.quick-cards-title {
  font-family: var(--display); font-size: 13px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase;
}
.quick-cards-close {
  font-size: 12px; color: var(--muted); background: none; border: none;
  cursor: pointer; padding: 4px 8px; transition: color 0.2s;
}
.quick-cards-close:hover { color: var(--text); }

/* ── Staggered card entrance ── */
.qc-stagger {
  opacity: 0; transform: translateY(18px) scale(0.97);
  filter: blur(4px);
  transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
              transform 0.7s cubic-bezier(0.22, 1, 0.36, 1),
              filter 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  transition-delay: calc(var(--qc-i, 0) * 180ms);
}
.qc-stagger.qc-in {
  opacity: 1; transform: translateY(0) scale(1); filter: blur(0);
}

/* ── AI response area ── */
.ai-response {
  width: 100%; max-width: 620px; margin-top: 12px; text-align: left;
  overflow: hidden; transition: max-height 0.5s var(--ease), opacity 0.4s;
  max-height: 0; opacity: 0;
}
.ai-response.show { max-height: 600px; opacity: 1; transition: max-height 0.8s var(--ease), opacity 0.8s var(--ease); }
.ai-response-inner {
  display: flex; gap: 16px; padding: 20px 24px;
  background: transparent;
  border: none;
  border-radius: 16px; font-size: 14px; color: var(--text2); line-height: 1.6;
}
.ai-response-inner .ai-icon {
  width: 32px; height: 32px; border-radius: 10px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
  font-family: var(--display); margin-top: 1px;
}
.ai-response-body { flex: 1; min-width: 0; }
.ai-response-text { line-height: 1.75; letter-spacing: 0.01em; word-spacing: 0.02em; }
.ai-response-text .cursor {
  display: inline-block; width: 2px; height: 14px; background: var(--text);
  margin-left: 2px; vertical-align: text-bottom;
  animation: blink-cursor 0.6s step-end infinite;
}
@keyframes blink-cursor { 50% { opacity: 0; } }
.ai-response-footer {
  display: flex; align-items: center; justify-content: center;
  margin-top: 14px;
}
.ai-reset {
  font-family: var(--sans); font-size: 13px; font-weight: 500; color: #6366f1;
  background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2);
  border-radius: 100px; cursor: pointer; padding: 8px 20px;
  transition: all 0.3s var(--ease);
  letter-spacing: 0.01em;
}
.ai-reset:hover { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); transform: translateY(-1px); }
[data-theme="dark"] .ai-reset { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.25); }

/* ── Links row below search ── */
.hero-links {
  display: flex; gap: 8px; margin-top: 32px; align-items: center;
}
.hero-link {
  font-size: 13px; color: var(--muted); text-decoration: none;
  transition: all 0.3s var(--ease); font-weight: 500;
  padding: 6px 14px; border-radius: 20px;
}
.hero-link:hover { color: var(--text); background: rgba(99,102,241,0.06); }
[data-theme="dark"] .hero-link:hover { background: rgba(99,102,241,0.12); }
.hero-links-sep {
  width: 3px; height: 3px; border-radius: 50%; background: var(--muted2); flex-shrink: 0;
}


/* ── Section titles ── */
section { padding: 100px 0; position: relative; }
.s-title {
  font-family: var(--display); font-size: 14px; font-weight: 600;
  color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 36px; display: flex; align-items: center; gap: 12px;
}
.s-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}


/* ── Site credit ── */
.site-credit {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 11px; color: var(--muted2);
  letter-spacing: 0.5px; opacity: 0.5; pointer-events: none;
}

/* ── Chai ── */
.chai-cup { position: fixed; font-size: 28px; pointer-events: none; z-index: 9000; animation: float-up 2s var(--ease) forwards; }
@keyframes float-up { 0% { opacity:1; transform:translateY(0) scale(1) rotate(0); } 100% { opacity:0; transform:translateY(-140px) scale(0.5) rotate(20deg); } }
.chai-display {
  position: fixed; bottom: 24px; right: 24px;
  font-family: var(--mono); font-size: 13px; color: var(--text);
  background: var(--surface); border: 1px solid var(--border);
  padding: 12px 24px; border-radius: var(--radius); z-index: 9000;
  box-shadow: var(--shadow);
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.3s, transform 0.3s var(--ease);
}
.chai-display.show { opacity: 1; transform: translateY(0); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  font-family: var(--mono); font-size: 14px; color: var(--text);
  background: var(--surface); border: 1px solid var(--border);
  padding: 14px 32px; border-radius: var(--radius);
  box-shadow: var(--shadow-hover); z-index: 10001;
  opacity: 0; transition: opacity 0.3s, transform 0.3s var(--ease);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


/* ── Confetti ── */
.confetti {
  position: fixed; top: -10px; width: 10px; height: 10px;
  border-radius: 3px; z-index: 100000; pointer-events: none;
  animation: confetti-fall 2.5s var(--ease) forwards;
}
@keyframes confetti-fall { 0% { transform:translateY(0) rotate(0deg); opacity:1; } 100% { transform:translateY(100vh) rotate(720deg); opacity:0; } }

/* ── Reveal ── */
.js .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s var(--ease), transform 0.7s var(--ease); }
.js .reveal.vis { opacity: 1; transform: translateY(0); }
.js .reveal-left { opacity: 0; transform: translateX(-36px); transition: opacity 0.7s var(--ease), transform 0.7s var(--ease); }
.js .reveal-right { opacity: 0; transform: translateX(36px); transition: opacity 0.7s var(--ease), transform 0.7s var(--ease); }
.js .reveal-left.vis, .js .reveal-right.vis { opacity: 1; transform: translateX(0); }
.js .reveal-scale { opacity: 0; transform: scale(0.93); transition: opacity 0.6s var(--ease), transform 0.6s var(--ease); }
.js .reveal-scale.vis { opacity: 1; transform: scale(1); }
.js .stagger > .reveal:nth-child(2) { transition-delay: 0.08s; }
.js .stagger > .reveal:nth-child(3) { transition-delay: 0.16s; }
.js .stagger > .reveal:nth-child(4) { transition-delay: 0.24s; }
.js .stagger > .reveal:nth-child(5) { transition-delay: 0.32s; }
.js .stagger > .reveal:nth-child(6) { transition-delay: 0.4s; }

/* ── Responsive ── */
@media (max-width: 768px) {
  nav { padding: 0 20px; height: 56px; }
  .nav-links, .nav-status { display: none !important; }
  .wrap, .wrap-wide { padding: 0 20px; }
  section { padding: 72px 0; }
  .hero-name { font-size: 28px; letter-spacing: -1px; white-space: normal; }
  .hero-sub { font-size: 15px; }
  .prompt-bar { padding: 14px 48px 14px 42px; font-size: 15px; }
  .prompt-chips { gap: 6px; }
  .prompt-chip { font-size: 12px; padding: 7px 14px; }
  .prompt-sep { display: none; }
  .quick-cards, .ai-response { max-width: 100%; }
  .hero-links { gap: 16px; }
}

/* ── Sound toggle ── */
.sound-toggle {
  background: none; border: 1px solid var(--border); border-radius: 50%;
  width: 36px; height: 36px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 16px;
  transition: all 0.3s var(--ease); color: var(--muted); flex-shrink: 0;
}
.sound-toggle:hover { border-color: #6366f1; color: var(--text); box-shadow: 0 0 16px rgba(99,102,241,0.15); }

/* ── Radial wipe ── */
.theme-wipe {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 10001;
  transform: translate(-50%, -50%) scale(0);
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.theme-wipe.expand {
  transform: translate(-50%, -50%) scale(1);
}
</style>

<script>
(function(){
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
document.documentElement.classList.add('js');

/* ── Dark mode ── */
const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', savedTheme);
const themeBtn = document.getElementById('theme-toggle');
if (themeBtn) {
  themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
  // Click handler added below in radial wipe section
}

/* ── Ambient Sound Engine (Web Audio API) ── */
const SFX = (() => {
  let ctx, enabled = false;
  const soundBtn = document.getElementById('sound-toggle');

  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      // iOS Safari: unlock audio by playing a silent buffer on first user gesture
      const silence = ctx.createBuffer(1, 1, ctx.sampleRate);
      const src = ctx.createBufferSource();
      src.buffer = silence;
      src.connect(ctx.destination);
      src.start();
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  // Convolver for subtle room reverb
  let reverbBuffer = null;
  function createReverb(c) {
    if (reverbBuffer) return;
    const len = c.sampleRate * 0.3;
    reverbBuffer = c.createBuffer(2, len, c.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = reverbBuffer.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    }
  }
  function addReverb(c, source, wet) {
    createReverb(c);
    const conv = c.createConvolver();
    conv.buffer = reverbBuffer;
    const wetGain = c.createGain();
    wetGain.gain.value = wet;
    source.connect(conv);
    conv.connect(wetGain);
    wetGain.connect(c.destination);
  }

  function play(type) {
    if (!enabled) return;
    const c = getCtx();
    const t = c.currentTime;

    if (type === 'tick') {
      // Tiny keystroke — barely audible, randomized pitch for natural feel
      const buf = c.createBuffer(1, c.sampleRate * 0.012, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 12);
      const src = c.createBufferSource(); src.buffer = buf;
      const lp = c.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.value = 2000 + Math.random() * 1500;
      const g = c.createGain(); g.gain.setValueAtTime(0.04 + Math.random() * 0.02, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.012);
      src.connect(lp); lp.connect(g); g.connect(c.destination);
      src.start(t); src.stop(t + 0.012);
    } else if (type === 'click') {
      // Woody tap — like a soft key press on a premium keyboard
      const buf = c.createBuffer(1, c.sampleRate * 0.04, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 8);
      const src = c.createBufferSource(); src.buffer = buf;
      const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3000; lp.Q.value = 0.5;
      const g = c.createGain(); g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
      src.connect(lp); lp.connect(g); g.connect(c.destination);
      src.start(t); src.stop(t + 0.04);
    } else if (type === 'chime') {
      // Glass bell — soft, warm, with natural harmonics and reverb tail
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc = c.createOscillator(); osc.type = 'sine';
        osc.frequency.value = freq;
        const g = c.createGain();
        const start = t + i * 0.06;
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(0.05 - i * 0.012, start + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, start + 0.5);
        osc.connect(g); g.connect(c.destination);
        addReverb(c, g, 0.15);
        osc.start(start); osc.stop(start + 0.5);
      });
    } else if (type === 'whoosh') {
      // Bubble pop — round, satisfying
      const osc = c.createOscillator(); osc.type = 'sine';
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.exponentialRampToValueAtTime(600, t + 0.04);
      osc.frequency.exponentialRampToValueAtTime(480, t + 0.1);
      const g = c.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.08, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.connect(g); g.connect(c.destination);
      addReverb(c, g, 0.1);
      osc.start(t); osc.stop(t + 0.12);
    } else if (type === 'toggle') {
      // Tiny sparkle — light, airy
      const osc = c.createOscillator(); osc.type = 'sine';
      osc.frequency.setValueAtTime(1047, t);
      osc.frequency.exponentialRampToValueAtTime(1175, t + 0.08);
      const g = c.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.025, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.connect(g); g.connect(c.destination);
      addReverb(c, g, 0.25);
      osc.start(t); osc.stop(t + 0.15);
    }
  }

  // Sound toggle button
  if (soundBtn) {
    function toggleSound(e) {
      if (e.type === 'touchend') e.preventDefault(); // prevent duplicate click
      enabled = !enabled;
      soundBtn.textContent = enabled ? '🔊' : '🔇';
      if (enabled) { getCtx(); play('click'); }
    }
    soundBtn.addEventListener('click', toggleSound);
    soundBtn.addEventListener('touchend', toggleSound);
  }

  return { play };
})();

/* ── Dark mode radial wipe ── */
if (themeBtn) {
  // Replace the existing click handler with radial wipe version
  themeBtn.replaceWith(themeBtn.cloneNode(true));
  const newThemeBtn = document.getElementById('theme-toggle');
  newThemeBtn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
  newThemeBtn.addEventListener('click', (e) => {
    SFX.play('toggle');
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    const nextBg = next === 'dark' ? '#0f0f17' : '#FFFFFF';

    // Calculate wipe size to cover the entire viewport
    const rect = newThemeBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const maxDist = Math.max(
      Math.hypot(cx, cy),
      Math.hypot(window.innerWidth - cx, cy),
      Math.hypot(cx, window.innerHeight - cy),
      Math.hypot(window.innerWidth - cx, window.innerHeight - cy)
    );
    const diameter = maxDist * 2;

    // Create wipe element
    const wipe = document.createElement('div');
    wipe.className = 'theme-wipe';
    wipe.style.left = cx + 'px';
    wipe.style.top = cy + 'px';
    wipe.style.width = diameter + 'px';
    wipe.style.height = diameter + 'px';
    wipe.style.background = nextBg;
    document.body.appendChild(wipe);

    // Trigger expansion
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        wipe.classList.add('expand');
      });
    });

    // After wipe covers screen, swap theme and remove wipe
    setTimeout(() => {
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      newThemeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
      // Fade out wipe
      wipe.style.transition = 'opacity 0.2s ease';
      wipe.style.opacity = '0';
      setTimeout(() => wipe.remove(), 200);
    }, 550);
  });
}

/* ── Hero entrance animation ── */
setTimeout(() => {
  $$('.hero-enter').forEach(el => el.classList.add('go'));
}, 100);

/* ── Floating particles ── */
(function() {
  const container = $('#particles');
  if (!container) return;
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 16) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.background = ['var(--text)','var(--muted)','var(--text2)','#9ca3af'][Math.floor(Math.random()*4)];
    container.appendChild(p);
  }
})();

/* ── Reveal observer ── */
try {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('vis'); obs.unobserve(e.target); }});
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  $$('.reveal,.reveal-left,.reveal-right,.reveal-scale').forEach(el => obs.observe(el));
} catch(e) { $$('.reveal,.reveal-left,.reveal-right,.reveal-scale').forEach(el => el.classList.add('vis')); }
setTimeout(() => $$('.reveal:not(.vis),.reveal-left:not(.vis),.reveal-right:not(.vis),.reveal-scale:not(.vis)').forEach(el => el.classList.add('vis')), 3000);

/* ── Scroll progress + nav + hero parallax ── */
window.addEventListener('scroll', () => {
  const sy = window.scrollY;
  const h = document.documentElement.scrollHeight - window.innerHeight;
  if(h > 0) $('#progress').style.width = (sy/h*100)+'%';
  $('nav').classList.toggle('scrolled', sy > 80);

  // Aurora parallax only — no hero content fade
  // Aurora parallax
  $$('.aurora-blob').forEach((b, i) => {
    const speed = [0.04, -0.03, 0.02][i] || 0.02;
    b.style.transform = `translateY(${sy * speed}px)`;
  });
}, { passive: true });

/* ── Text scramble on hero name ── */
try {
  const el = $('#hero-text');
  if(el) {
    const orig = el.innerHTML, txt = el.textContent;
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%';
    let iter = 0;
    setTimeout(() => {
      const iv = setInterval(() => {
        el.textContent = txt.split('').map((c,i) => (c===' '||c==='\n') ? c : i < iter ? txt[i] : chars[Math.floor(Math.random()*chars.length)]).join('');
        iter += 2;
        if(iter >= txt.length) { clearInterval(iv); el.innerHTML = orig; }
      }, 22);
    }, 600);
  }
} catch(e) {}

/* ── Magnetic buttons ── */
$$('.magnetic').forEach(btn => {
  btn.addEventListener('mousemove', e => {
    const r = btn.getBoundingClientRect();
    const x = e.clientX - r.left - r.width/2;
    const y = e.clientY - r.top - r.height/2;
    btn.style.transform = `translate(${x*0.25}px,${y*0.25}px)`;
  });
  btn.addEventListener('mouseleave', () => { btn.style.transform = ''; });
});

/* ── Email hover text swap ── */
['email-btn','contact-email'].forEach(id => {
  const btn = $('#'+id);
  if(!btn) return;
  const orig = btn.textContent, hover = btn.dataset.hover;
  btn.addEventListener('mouseenter', () => { btn.textContent = hover; });
  btn.addEventListener('mouseleave', () => { btn.textContent = orig; });
});

/* ── Count-up animation for stats ── */
function countUp(el, target, suffix='') {
  let current = 0;
  const step = target / 40;
  const iv = setInterval(() => {
    current += step;
    if (current >= target) { current = target; clearInterval(iv); }
    el.textContent = (target % 1 === 0 ? Math.round(current) : current.toFixed(2)) + suffix;
  }, 25);
}
try {
  const statObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const el = e.target, val = el.dataset.count, suffix = el.dataset.suffix || '';
        countUp(el, parseFloat(val), suffix);
        statObs.unobserve(el);
      }
    });
  }, { threshold: 0.5 });
  $$('[data-count]').forEach(el => statObs.observe(el));
} catch(e) {}

/* ── Chai counter ── */
let chaiN = 0;
const chaiMsg = {1:'First cup. Good start.',3:'Getting serious.',5:'You might have a problem.',7:'This is commitment.',10:"Okay, you're hired.",15:"I'm genuinely impressed.",20:'This is legendary.'};
const chaiEl = $('#chai-trigger');
if (chaiEl) chaiEl.addEventListener('click', e => {
  e.preventDefault(); chaiN++;
  const cup = document.createElement('div');
  cup.className='chai-cup'; cup.textContent='☕';
  cup.style.left=(e.clientX-14)+'px'; cup.style.top=(e.clientY-14)+'px';

  const chunks = [
    { id: 'proj-mole', section: 'projects', title: 'The Mole — Overview', body: 'An iOS mystery game where you chat with 4 AI agents to solve a case — but one of them is secretly the mole. It has a different system prompt, knows the answer, and is strategically lying to protect the culprit. You have to figure out which one. 4 AI agents sharing 1 context window with 2 different objectives. 4+ original mysteries each written from scratch with a unique cast. Every game plays differently — conversation is emergent, not scripted. Built end-to-end with Claude Code, SwiftUI, Claude API, and Supabase.', tags: 'ai,ml,agent,game,ios,swift,security,build,product,ship,claude,supabase,mole,mystery,social,deduction' },
    { id: 'proj-mole-arch', section: 'projects', title: 'The Mole — AI Architecture (Deep Dive)', body: 'Same model. Same clues. Same chat history. Completely different behavior — because one agent has a different objective. Architecture: all 4 agents receive identical context each round — the new clue, the chat history so far, and the user\'s input. 3 investigators have a system prompt that says: "Your goal: find the truth. Reason honestly. Debate your teammates. You can be wrong — but never deliberately misleading." The mole has a system prompt that says: "The answer is [REDACTED]. Your goal: steer the group toward the wrong suspect. Sound reasonable. Don\'t get caught." Each agent has a persistent cognitive state stored in Supabase — a belief matrix tracking suspicion scores for every other agent. After each round, agents update beliefs using Bayesian-style reasoning. If an agent voted against the consensus or said something contradictory, suspicion rises. Model-tier routing: the mole uses Claude Sonnet (smarter, better at deception and maintaining consistency while lying), innocent agents use Claude Haiku (faster, cheaper, slightly more predictable — realistic for honest reasoners). Example from a live round: given a clue about financial motives, investigator Leah says "Valentina benefits more from chaos than anyone," investigator Marcus shifts suspicion to Valentina — but Jordan (the mole) steers toward the wrong suspect: "Valentina\'s a 15-season vet — she\'d never risk that. Dex is cornered financially. Desperate people do stupid things." Same clues, same chat — Jordan is steering you away from the real culprit. That\'s the game.', tags: 'ai,agent,architecture,belief,memory,routing,sonnet,haiku,swift,supabase,mole,how,work,technical,system,prompt,cognitive,bayesian,deception' },
    { id: 'proj-mole-writing', section: 'projects', title: 'The Mole — Original Mystery Writing', body: 'Every mystery in The Mole is written from scratch by Anmol — different setting, different cast, different tone. 4+ original mysteries total. Example from Mystery #001, "The Final Rosé": a vineyard in Provence, a reality TV cast, a deleted social media post, and a bet that connects everyone to the crime. The writing aims for literary quality — atmospheric, character-driven, with planted clues that reward careful reading. The mysteries are designed so the AI agents can reason about them naturally, with enough ambiguity that the mole can plausibly deflect without being obviously wrong.', tags: 'mole,writing,mystery,creative,stories,original,game,narrative' },
    { id: 'proj-fund', section: 'projects', title: 'AI PE Fund Matcher — Overview', body: 'M&A advisors spend 2-4 hours per client manually researching which PE funds might acquire them — limited to funds they already know. This tool takes a company URL, analyzes the business, and returns a ranked shortlist of PE fund matches with explainable reasoning in under 2 minutes. Stats: 18 seconds vs 4 hours. 95% accuracy. $0.33 per query vs $400 industry benchmark. 500+ funds covered. Built with Python, Claude API, Jina AI, Tool Calling, and Hybrid ML. Code available on Bitbucket.', tags: 'ai,ml,python,fintech,data,pipeline,pe,venture,fund,build,product,ship,matcher,accuracy,cost' },
    { id: 'proj-fund-pipeline', section: 'projects', title: 'AI PE Fund Matcher — 5-Stage Pipeline (Deep Dive)', body: 'A sequential 5-stage pipeline where each stage feeds directly into the next: Stage 1 — Website Extraction: Jina AI Reader converts any company URL — including React SPAs and Angular apps — into clean, parseable markdown. Stage 2 — Structured Extraction: Claude API with tool calling and schema enforcement extracts sector, revenue, size, HQ into guaranteed structured JSON. Tool calling ensures deterministic inputs — free-form extraction hallucinates missing fields and returns inconsistent shapes, so schema enforcement guarantees every company profile has the same structure. Stage 3 — Rule-Based Filter: hard filters eliminate mismatched funds. Cuts 500+ funds down to ~15 candidates fast and cheap. Stage 4 — LLM Ranking: Claude reasons across the remaining candidates, scoring each on thesis fit, portfolio pattern, deal size alignment. Stage 5 — Ranked Output: 3-5 PE funds, each with plain-English reasoning. Explainable, not just a list. Key design decision: hybrid approach (rules + LLM) instead of pure LLM. Asking an LLM to reason across 500 funds at once is expensive, slow, and drifts. Hard rules eliminate the obviously wrong candidates first, then LLM reasoning handles the nuanced fit scoring. Rules for speed, LLM for judgment.', tags: 'ai,pipeline,architecture,jina,scraping,scoring,ranking,pe,fund,how,work,technical,python,cost,accuracy,tool,calling,schema,hybrid,rules,extraction,stage' },
    { id: 'proj-fund-output', section: 'projects', title: 'AI PE Fund Matcher — Sample Output & Reasoning', body: 'Example input: FreyaVoice.ai — AI voice platform, ~$2-10M revenue, Austin TX. Output in 18.3 seconds at $0.33 API cost. Match #1: Vista Equity Partners (Score: 92) — "FreyaVoice\'s B2B SaaS model with recurring revenue aligns directly with Vista\'s thesis of acquiring profitable software businesses. AI voice infrastructure is adjacent to Vista\'s existing portfolio companies in HR and customer engagement tech. Deal size fits Vista\'s lower-middle market entry point." Match #2: Francisco Partners (Score: 84) — "Francisco\'s portfolio includes voice and speech AI companies. Strong pattern match on AI infrastructure plays at the Series A-B stage. Austin-based portfolio companies suggest comfort with the geography." Match #3: Thoma Bravo (Score: 77) — "Thoma Bravo targets software businesses with strong gross margins. FreyaVoice qualifies on business model, but deal size is at the lower end of Thoma\'s typical range. Worth a conversation at growth stage." Each match includes plain-English reasoning — not just a score, but why the fund is a fit.', tags: 'ai,fund,output,example,vista,francisco,thoma,score,reasoning,match,pe,sample,result' },

    { id: 'exp-gs', section: 'experience', title: 'Product Manager — AI/ML Products at Goldman Sachs (2022–2026)', body: 'Shipped LLM Deal Pricing workflow (RAG with hybrid embedding + keyword retrieval, source-linked outputs, MD-benchmarked eval suite) — cut research from 5–10 min to 2–3 min per deal, ~90% fewer errors. Built ML Payment Monitoring — proactive rules, automated context delivery, ML prioritization by failure likelihood — ~50% faster per payment, ~70% cost reduction. Led 15+ engineers, 2 UX designers, 4 data scientists across 30+ sprints. Also launched 0→1 ML-driven B2B Fintech platform — $10M+ volume in 12 months, 40% higher approvals, 25% lower default risk.', tags: 'ai,ml,product,pm,fintech,leadership,team,hire,lending,payment,data,impact,metric,build,ship,rag,llm,eval,work,worked,experience,job,career,goldman,sachs' },
    { id: 'exp-gs-deal', section: 'experience', title: 'Goldman Sachs — LLM Deal Pricing Workflow (Deep Dive)', body: 'An LLM-powered internal tool for Managing Directors doing deal pricing in Investment Banking. Problem: MDs spent 5-10 minutes per deal manually searching through past deal comps and pricing precedents across scattered internal databases, PDFs, and spreadsheets. Data was siloed and search was keyword-only, so MDs often missed relevant comps or re-entered data manually, introducing errors. Solution: RAG pipeline with hybrid retrieval — combines embedding-based semantic search (for conceptual similarity — e.g. "similar deal structure") with BM25 keyword matching (for exact terms — e.g. specific company names, deal types, dates). This hybrid approach catches both fuzzy and exact matches, which neither method does alone. Every output is source-linked — each data point traces back to the original document, so MDs can verify and trust the results without blind faith in the LLM. Anmol designed and built the eval harness himself. It benchmarks the system against MD-curated gold-standard comp sets: for a given deal, what are the 10 best comps an experienced MD would pick? Then measures precision (are the system\'s comps actually relevant?), recall (does it find the ones the MD picked?), and factual accuracy (are the numbers correct?). This eval harness became the standard quality measurement tool for the entire team. Result: cut research time from 5-10 min to 2-3 min per deal, ~90% fewer data-entry errors. MDs trust it because they can see the sources.', tags: 'ai,llm,rag,eval,goldman,deal,pricing,embedding,bm25,retrieval,md,research,accuracy,benchmark,hybrid,source,investment,banking' },
    { id: 'exp-gs-payment', section: 'experience', title: 'Goldman Sachs — ML Payment Monitoring (Deep Dive)', body: 'An ML-driven system for proactively detecting and prioritizing failing payments before they escalate into costly incidents. Problem: payment operations teams at Goldman were reacting to failures after the fact — manually triaging hundreds of alerts daily with no prioritization. A $50 failed payment got the same attention as a $5M one. Teams were overwhelmed, resolution was slow, and costs were high. Solution: built a three-layer system. Layer 1 — Proactive Rule Engine: flags payments likely to fail based on historical patterns (counterparty reliability, time-of-day patterns, corridor-specific failure rates). Catches problems before they become alerts. Layer 2 — Automated Context Delivery: when a payment is flagged, the system automatically surfaces relevant transaction history, counterparty info, and similar past failures so the ops analyst doesn\'t waste time pulling context manually. Layer 3 — ML-Based Prioritization: ranks all flagged payments by failure likelihood AND business impact. A $5M payment with 80% failure probability gets immediate attention; a $50 retry gets deprioritized. Anmol\'s approach: sat with ops teams to watch the system catch failing payments in real time. Iterated on the priority scoring based on what analysts actually needed to see first. The system was designed around how humans actually triage, not how engineers think they should. Result: ~50% faster resolution per payment, ~70% cost reduction in payment operations. The prioritization layer alone saved hours of analyst time daily by eliminating low-value triage.', tags: 'ai,ml,payment,monitoring,ops,rules,prioritization,goldman,operations,cost,automation,triage,proactive,context,analyst' },
    { id: 'exp-gs-fintech', section: 'experience', title: 'Goldman Sachs — 0→1 ML Fintech Platform (Deep Dive)', body: 'A 0-to-1 ML-driven B2B fintech lending platform built from scratch within Goldman Sachs. Anmol was the founding PM — owned the product from initial concept through launch and scale. Problem: the existing underwriting process was manual, slow, and conservative — rejecting good borrowers and approving risky ones based on incomplete data and human judgment. Solution: ML-powered credit decisioning that ingests far more signals than a human underwriter can process — transaction history patterns, industry risk factors, cash flow seasonality, counterparty network effects. The ML models learned to identify creditworthy borrowers that manual underwriting would reject, while also catching risky ones that looked good on paper. Cross-functional team: 15+ engineers, 4 data scientists, 2 UX designers across 30+ sprints. Anmol owned the roadmap, wrote the PRDs, ran sprint planning, and was embedded with the engineering team daily — not a PM who specs and disappears. Results: 40% higher approval rates with 25% lower default risk (better decisions, not just more approvals). Hit $10M+ transaction volume in the first 12 months. The platform proved that ML-driven lending could outperform human judgment on both precision and recall.', tags: 'fintech,lending,ml,0to1,launch,platform,credit,underwriting,goldman,leadership,team,volume,growth,approval,default,risk,decisioning' },
    { id: 'exp-formlabs', section: 'experience', title: 'Software PM Intern at Formlabs (2021)', body: '$2B 3D printing company. Launched online shopping for Form 3L/3BL. Diagnosed 47% config drop-off, built guided questionnaire — cut drop-off to 28%, +23% conversion, +18% AOV, ~35% fewer support tickets. $2M+ projected revenue. 12 usability tests, 1000+ survey responses.', tags: 'product,pm,hardware,ecommerce,usability,ux,research,user,build,ab-testing,work,worked,experience,job,career,formlabs' },

  /* ── BM25 Retrieval ── */
  const stopwords = new Set(['the','a','an','is','are','was','were','be','been','am','do','does','did','will','would','could','should','can','may','might','shall','has','have','had','this','that','these','those','what','which','who','whom','whose','where','when','why','how','all','each','every','both','few','more','most','other','some','such','than','too','very','just','about','above','after','again','also','any','because','before','below','between','but','by','down','during','for','from','here','if','in','into','it','its','let','me','my','no','nor','not','of','off','on','once','only','or','our','out','over','own','per','same','she','so','still','tell','show','then','there','they','to','up','upon','us','we','with','yet','you','your','him','his','her','he','i','and']);

  function tokenize(text) {

  /* ── Query expansion: map common variants to corpus terms ── */

  function expandQuery(tokens) {
    const expanded = new Set(tokens);
    tokens.forEach(t => { (queryExpansion[t] || []).forEach(e => expanded.add(e)); });

  const docTokens = chunks.map(c => tokenize(c.title + ' ' + c.body + ' ' + c.tags.replace(/,/g, ' ')));
  const avgDl = docTokens.reduce((s, d) => s + d.length, 0) / docTokens.length;
  const df = {};
  docTokens.forEach(tokens => { new Set(tokens).forEach(t => { df[t] = (df[t] || 0) + 1; }); });
  const N = chunks.length, k1 = 1.5, b = 0.75;

  function bm25(queryTokens, docIdx) {
    const tokens = docTokens[docIdx], dl = tokens.length, tf = {};
    tokens.forEach(t => { tf[t] = (tf[t] || 0) + 1; });
    let score = 0;
    for (const qt of queryTokens) {
      const f = tf[qt] || 0; if (!f) continue;
      const idf = Math.log((N - (df[qt]||0) + 0.5) / ((df[qt]||0) + 0.5) + 1);
      score += idf * (f * (k1 + 1)) / (f + k1 * (1 - b + b * dl / avgDl));
    }
    return score;

  function retrieve(query, topK = 6) {
    const raw = tokenize(query);
    if (!raw.length) return chunks.slice(0, topK);

    const scored = chunks.map((c, i) => ({ chunk: c, score: bm25(qt, i) }));
    scored.sort((a, b) => b.score - a.score);
    return scored.filter(s => s.score > 0).slice(0, topK).map(s => s.chunk);
  }

  /* ── Stream response from Supabase → Claude ── */

  /* ── Fallback: local response from retrieved chunks ── */
  function buildFallback(query, retrieved) {
    if (!retrieved.length) return "Hmm, I don't have a great match for that. Try asking about Anmol's projects, experience at Goldman Sachs, skills, writing, or why you should hire him.";
    const lower = query.toLowerCase();
    const top = retrieved[0];
    const topSection = top.section;

    // Project-name detection — override section routing when user mentions a specific project
    const isMoleQuery = lower.includes('mole');
    const isFundQuery = lower.includes('fund') || lower.includes('matcher') || lower.includes('pe fund');

  function streamLocal(container, text) {
    return new Promise(resolve => {
      container.innerHTML = '';
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      // Convert \n\n to a placeholder we can detect during streaming
      const chars = [...text];
      (function type() {
        if (i < chars.length) {
          const c = chars[i];
          // Build displayed text up to current position, converting \n to <br>
          const visible = text.slice(0, i + 1).replace(/\n/g, '<br>');
          container.innerHTML = visible;
          container.appendChild(cursor);
          if (i % 3 === 0) SFX.play('tick');
          i++;
          // Pause at newlines for natural pacing
          const delay = c === '\n' ? 60 : c === '—' ? 120 : c === ',' ? 80 : c === '.' ? 100 : 15 + Math.random() * 25;
          setTimeout(type, delay);
        } else {
          setTimeout(() => { cursor.remove(); resolve(); }, 1500);
        }
      })();
    });
  }

    }
  });
})();

(function() {

/* ── Contextual Easter Egg: Text selection quip ── */
(function() {
  let cooldown = false;
  const quips = [
    'Good eye — that\'s the best part.',
    'Noted. Sharing with the team?',
    'You have excellent taste.',
    'That\'s the line that closes the deal.',
    'Screenshot this one.',
  ];
  document.addEventListener('mouseup', function(e) {
    const sel = window.getSelection().toString().trim();
    if (!sel || sel.length < 10 || sel.length > 200 || cooldown) return;
    cooldown = true;
    setTimeout(() => cooldown = false, 15000);
    const tip = document.createElement('div');
    tip.textContent = quips[Math.floor(Math.random() * quips.length)];
    tip.style.cssText = 'position:fixed;z-index:9999;background:#6366f1;color:#fff;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;font-family:var(--sans);pointer-events:none;opacity:0;transform:translateY(4px);transition:all 0.3s ease;white-space:nowrap;';
    tip.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
    tip.style.top = (e.clientY - 36) + 'px';
    document.body.appendChild(tip);
    requestAnimationFrame(() => { tip.style.opacity = '1'; tip.style.transform = 'translateY(0)'; });
    setTimeout(() => {
      tip.style.opacity = '0'; tip.style.transform = 'translateY(-4px)';
      setTimeout(() => tip.remove(), 300);
    }, 2500);
  });
})();

})();
